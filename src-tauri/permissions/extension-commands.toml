# Tauri 2.11.1 introduced an ACL check that rejects app-level
# `#[tauri::command]` calls when the requesting webview was loaded from
# a remote origin (e.g. http://localhost:4010 — every dev-mode
# extension). The check sits behind `!is_local` in
# crates/tauri/src/webview/mod.rs and does NOT exist in 2.11.0.
#
# Side effect: as soon as ANY app-level permission is declared, the
# `has_app_acl_manifest` flag becomes true and EVERY app command needs
# an ACL grant — even for local-origin calls from the main window.
# That is why both the `extensions` capability AND the `default`
# (main window) capability need allow-lists.
#
# Whenever a new `#[tauri::command]` is added to lib.rs's
# `invoke_handler!`, append it to `allow-app-commands` below and (if
# it should be reachable from extensions) to `allow-extension-commands`
# as well.

# ------------------------------------------------------------------
# Extension-facing commands. Granted to webviews matching `ext_*`.
# Each of these commands still goes through haex-vault's per-call
# permission manager (database / filesystem / web / mail / passwords
# scoped by the extension's manifest); this only opens the IPC channel
# so those checks can run.
# ------------------------------------------------------------------
[[permission]]
identifier = "allow-extension-commands"
description = """
Grants extension webviews access to every `extension_*` Tauri command.
"""

commands.allow = [
  # Extension info / context
  "extension_get_info",
  "extension_context_get",
  "extension_context_set",
  "extension_signal_ready",

  # Database
  "extension_database_query",
  "extension_database_execute",
  "extension_database_transaction",
  "extension_database_register_migrations",
  "apply_synced_extension_migrations",

  # Filesystem
  "extension_filesystem_read_file",
  "extension_filesystem_write_file",
  "extension_filesystem_read_dir",
  "extension_filesystem_mkdir",
  "extension_filesystem_remove",
  "extension_filesystem_rename",
  "extension_filesystem_copy",
  "extension_filesystem_exists",
  "extension_filesystem_stat",
  "extension_filesystem_open_file",
  "extension_filesystem_save_file",
  "extension_filesystem_select_file",
  "extension_filesystem_select_folder",
  "extension_filesystem_known_paths",
  "extension_filesystem_watch",
  "extension_filesystem_unwatch",
  "extension_filesystem_is_watching",

  # Web (HTTP)
  "extension_web_fetch",
  "extension_web_open",

  # Mail (IMAP + SMTP)
  "extension_mail_list_mailboxes",
  "extension_mail_fetch_envelopes",
  "extension_mail_fetch_message",
  "extension_mail_set_flags",
  "extension_mail_move_messages",
  "extension_mail_append_message",
  "extension_mail_send_message",
  "extension_mail_build_rfc822",

  # Passwords vault
  "extension_password_list",
  "extension_password_read",
  "extension_password_create",
  "extension_password_update",
  "extension_password_delete",

  # Permissions / session
  "extension_permissions_check_web",
  "extension_permissions_check_database",
  "extension_permissions_check_filesystem",
  "resolve_permission_prompt",
  "grant_session_permission",
  "get_extension_session_permissions",
  "remove_extension_session_permission",

  # Logging / limits
  "extension_logging_write",
  "extension_logging_read",
  "get_extension_limits",
  "update_extension_limits",
  "reset_extension_limits",

  # Remote storage
  "extension_remote_storage_list_backends",
  "extension_remote_storage_add_backend",
  "extension_remote_storage_remove_backend",
  "extension_remote_storage_update_backend",
  "extension_remote_storage_test_backend",
  "extension_remote_storage_list",
  "extension_remote_storage_upload",
