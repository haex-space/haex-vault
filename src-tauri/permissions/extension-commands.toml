# ------------------------------------------------------------------
# All app commands — granted to the main window's `default` capability.
# Includes everything in `allow-extension-commands` plus internal vault
# management, sync, MLS, bridge, etc. that extensions never call.
# ------------------------------------------------------------------
[[permission]]
identifier = "allow-app-commands"
description = """
Grants the main window access to every `#[tauri::command]` registered
in haex-vault's `invoke_handler!`. Mirrors the lib.rs registration —
keep them in sync when adding/removing commands.
"""

