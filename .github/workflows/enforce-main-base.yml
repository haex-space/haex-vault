name: Enforce develop-first

# Hard gate for PRs targeting `main`. Feature work belongs on `develop`;
# `main` is updated only by release-please, sync PRs, and (in the rare
# case of an actual hotfix) the explicit `hotfix/*` lane.
#
# Without this check, anybody can PR feature work directly onto `main`
# and skip the release-please flow — the doc-only convention in
# `release-please.yml` ("feature branches → PR → develop → PR → main")
# was already broken multiple times before this workflow existed.

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-main-base:
    runs-on: ubuntu-22.04
    steps:
      - name: Check PR head branch is allowed to target main
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Allowlist for branches that may target `main`:
          #   develop                      → the gitflow release path (develop → main)
          #   release-please--*            → release-please action PRs
          #   sync-*                       → release-please sync helpers (e.g. sync-cargo-lock,
          #                                  cross-branch sync PRs created by tooling)
          #   hotfix/*                     → urgent production hotfixes that legitimately
          #                                  bypass develop; the same fix should also be
          #                                  PR'd to develop separately to keep branches aligned
          case "$HEAD_REF" in
            develop|release-please--*|sync-*|hotfix/*)
              echo "::notice::PR head '$HEAD_REF' is permitted to target main"
              ;;
            *)
              echo "::error::Feature/fix PRs must target 'develop', not 'main'."
              echo "::error::Head branch '$HEAD_REF' is not on the main allowlist."
              echo "::error::Allowed patterns: develop | release-please--* | sync-* | hotfix/*"
              echo "::error::Retarget this PR to 'develop' (gh pr edit --base develop)."
              exit 1
              ;;
          esac
