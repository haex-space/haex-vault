name: Release

# Release pipeline operates on the `release` branch:
#   1. prepare-release: fetch main, fast-forward release with main's commits, bump version,
#      push to release-prep/vX.Y.Z.
#   2. verify-prep: call build.yml via workflow_call on the prep branch so the
#      full CI suite (tests + desktop/android builds + e2e) runs against the
#      bumped commit. This replaces the old PR + branch-protection gate that
#      couldn't trigger build.yml from a bot-authored PR (GitHub's
#      anti-recursion rule blocks workflow events from the GITHUB_TOKEN).
#   3. merge-prep: if verify succeeds, fast-forward release to prep HEAD and
#      push directly (no PR, no auto-merge dance).
#   4. tag-release: tag the release commit as vX.Y.Z.
#   5. create-draft-release / build-desktop / build-android / publish-release:
#      check out the new tag, build release artifacts, upload to GitHub release.
#   6. sync-to-main: open a PR back to main with the bump commit so main's version
#      files catch up (auto-merge enabled — fails open if there's a conflict).

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g. "2.0.0") or bump type ("patch"/"minor"/"major"). Leave empty to auto-detect from conventional commits.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  actions: read

# Only one release at a time. cancel-in-progress=false means a second
# trigger queues behind the running one — never mid-pipeline cancel
# (which could leave a tag pushed without published artifacts).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Compute version, build prep branch (release + main + bump), push it.
  # No PR is created — verify-prep below runs CI against the pushed branch
  # and merge-prep fast-forwards release directly on success.
  # ─────────────────────────────────────────────────────────────────────────
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      new_version: ${{ steps.compute.outputs.new_version }}
      tag_name: ${{ steps.compute.outputs.tag_name }}
      prep_branch: ${{ steps.compute.outputs.prep_branch }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Determine new version
        id: compute
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          # Source of truth for "what was last released" is the release branch's
          # package.json — main lags behind by design.
          git fetch origin release
          BASE_VERSION=$(git show origin/release:package.json | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))")
          echo "Last released version (from release branch): $BASE_VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ -n "$VERSION_OVERRIDE" ]; then
            case "$VERSION_OVERRIDE" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              *)
                if [[ "$VERSION_OVERRIDE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                  NEW_VERSION="$VERSION_OVERRIDE"
                else
                  echo "::error::Invalid version override: '$VERSION_OVERRIDE'. Use 'patch', 'minor', 'major', or a semver like '2.0.0'."
                  exit 1
                fi
                ;;
            esac
            echo "Manual override → $NEW_VERSION"
          else
            # Auto-detect from conventional commits since the last release tag
            LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "${LAST_TAG}..origin/main" --pretty=format:"%s%n%b" --no-merges)
            else
              COMMITS=$(git log origin/main --pretty=format:"%s%n%b" --no-merges)
            fi

            BUMP_TYPE="patch"
            if echo "$COMMITS" | grep -qE "^(break|BREAKING CHANGE)"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
              BUMP_TYPE="minor"
            fi

            case "$BUMP_TYPE" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
            echo "Auto-detected: $BUMP_TYPE bump → $NEW_VERSION (commits since $LAST_TAG)"
          fi

          PREP_BRANCH="release-prep/v${NEW_VERSION}"
          echo "Bumping $BASE_VERSION → $NEW_VERSION on $PREP_BRANCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "prep_branch=$PREP_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build release-prep branch (release + main + bump)
        env:
          NEW_VERSION: ${{ steps.compute.outputs.new_version }}
          PREP_BRANCH: ${{ steps.compute.outputs.prep_branch }}
        run: |
          git fetch origin release main

          # Configure git user early (needed for merge commit)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Start from release HEAD, then merge main into it.
          # Using --no-ff to handle diverging branches gracefully (release has
          # version bump commits that main doesn't have).
          git checkout -b "$PREP_BRANCH" origin/release
          git merge origin/main --no-ff -m "Merge main into release-prep/v${NEW_VERSION}"

          # Apply version bump
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$NEW_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
          cd src-tauri && cargo check && cd ..

          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "Bump version to $NEW_VERSION"
          # --force so a re-run after a failure can overwrite the stale
          # branch from the previous attempt. Safe here because the prep
          # branch is ephemeral and owned exclusively by this pipeline.
          git push --force origin "$PREP_BRANCH"

  # ─────────────────────────────────────────────────────────────────────────
  # Run the full CI suite against the prep branch by calling build.yml as a
  # reusable workflow. This is the replacement for the old "PR + branch
  # protection" gate — workflow_call runs explicitly inside the release
  # workflow context, so it doesn't hit GitHub's anti-recursion rule.
  # ─────────────────────────────────────────────────────────────────────────
  verify-prep:
    needs: prepare-release
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.prepare-release.outputs.prep_branch }}
    secrets: inherit

  # ─────────────────────────────────────────────────────────────────────────
  # Fast-forward release branch to prep HEAD and push.
  # No PR dance: verify-prep above is our gate; if we got here, CI is green.
  # ─────────────────────────────────────────────────────────────────────────
  merge-prep:
    needs: [prepare-release, verify-prep]
    runs-on: ubuntu-22.04
    outputs:
      merged_sha: ${{ steps.merge.outputs.merged_sha }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: release
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward release to prep HEAD
        id: merge
        env:
          PREP_BRANCH: ${{ needs.prepare-release.outputs.prep_branch }}
        run: |
          git fetch origin "$PREP_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # FF-only: if release has drifted ahead of prep somehow, bail
          # instead of creating a merge commit or rewriting history.
          if ! git merge --ff-only "origin/$PREP_BRANCH"; then
            echo "::error::release is not a fast-forward of $PREP_BRANCH. Manual reconciliation required."
            exit 1
          fi
          git push origin release
          MERGED_SHA=$(git rev-parse HEAD)
          echo "merged_sha=$MERGED_SHA" >> "$GITHUB_OUTPUT"
          echo "release fast-forwarded to $MERGED_SHA"

      - name: Delete prep branch
        env:
          PREP_BRANCH: ${{ needs.prepare-release.outputs.prep_branch }}
        run: |
          # Cleanup: prep branch has done its job and release now points at
          # the same commit. Leaving it around makes re-runs fail with
          # non-fast-forward on the next same-version attempt.
          git push origin --delete "$PREP_BRANCH" || \
            echo "::warning::could not delete $PREP_BRANCH (may already be gone)"

  # ─────────────────────────────────────────────────────────────────────────
  # Tag the release commit as vX.Y.Z
  # ─────────────────────────────────────────────────────────────────────────
  tag-release:
    needs: [prepare-release, merge-prep]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.merge-prep.outputs.merged_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Tag and push
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
          MERGED_SHA: ${{ needs.merge-prep.outputs.merged_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally"
          else
            git tag "$TAG_NAME" "$MERGED_SHA"
          fi
          git push origin "$TAG_NAME" 2>&1 | grep -v "Everything up-to-date" || true
          echo "Tagged $MERGED_SHA as $TAG_NAME"

  # ─────────────────────────────────────────────────────────────────────────
  # Generate release notes and create draft GitHub release
  # ─────────────────────────────────────────────────────────────────────────
  create-draft-release:
    needs: [prepare-release, tag-release]
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release notes
        env:
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        run: |
          CURRENT_TAG="v${PACKAGE_VERSION}"
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ] || [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          fi

          echo "Release notes: $PREVIOUS_TAG → $CURRENT_TAG"

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|%b" --no-merges)
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"%s|%b" --no-merges)
          fi

          BREAKING=""
          FEATURES=""
          FIXES=""

          while IFS='|' read -r subject body; do
            [[ "$subject" == "Bump version to"* ]] && continue

            DETAILS=""
            if [ -n "$body" ]; then
              DETAILS=$(echo "$body" | grep -E "^- " | head -10 || true)
            fi

            if [[ "$subject" == break:* ]] || [[ "$subject" == break\(*\):* ]] || [[ "$subject" == BREAKING* ]] || [[ "$body" == *"BREAKING CHANGE"* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^break[^:]*: //' | sed 's/^BREAKING CHANGE: //')
              BREAKING="${BREAKING}- ${CLEAN}"$'\n'
              [ -n "$DETAILS" ] && BREAKING="${BREAKING}${DETAILS}"$'\n'
            elif [[ "$subject" == feat:* ]] || [[ "$subject" == feat\(*\):* ]] || [[ "$subject" == feature:* ]] || [[ "$subject" == feature\(*\):* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^feat[^:]*: //' | sed 's/^feature[^:]*: //')
              FEATURES="${FEATURES}- ${CLEAN}"$'\n'
              [ -n "$DETAILS" ] && FEATURES="${FEATURES}${DETAILS}"$'\n'
            elif [[ "$subject" == fix:* ]] || [[ "$subject" == fix\(*\):* ]]; then
              CLEAN=$(echo "$subject" | sed 's/^fix[^:]*: //')
              FIXES="${FIXES}- ${CLEAN}"$'\n'
              [ -n "$DETAILS" ] && FIXES="${FIXES}${DETAILS}"$'\n'
            fi
          done <<< "$COMMITS"

          NOTES=""
          [ -n "$BREAKING" ] && NOTES="${NOTES}## ⚠️ Breaking Changes"$'\n\n'"${BREAKING}"$'\n'
          [ -n "$FEATURES" ] && NOTES="${NOTES}## ✨ Features"$'\n\n'"${FEATURES}"$'\n'
          [ -n "$FIXES" ] && NOTES="${NOTES}## 🐛 Bug Fixes"$'\n\n'"${FIXES}"$'\n'

          if [ -z "$NOTES" ]; then
            NOTES="Release v${PACKAGE_VERSION}"$'\n\n'"See commit history for changes."
          fi

          NOTES="${NOTES}"$'\n'"---"$'\n\n'"📥 **Downloads**: See assets below for your platform."
          echo "$NOTES" > release_notes.md
          cat release_notes.md

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        env:
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.new_version }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');

            // Delete existing release for this tag if any (idempotent re-runs)
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });
              const existing = releases.find(r => r.tag_name === process.env.TAG_NAME);
              if (existing) {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existing.id
                });
              }
            } catch (e) { /* no existing release */ }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              name: `haex-vault v${process.env.PACKAGE_VERSION}`,
              body: releaseNotes,
              draft: true,
              prerelease: false
            });
            core.setOutput('release_id', data.id);

  # ─────────────────────────────────────────────────────────────────────────
  # Reuse binaries built by verify-prep (via build.yml workflow_call).
  # Because verify-prep runs nested under this workflow run, its uploaded
  # artifacts are visible to this job without needing a run-id.
  #
  # Why this instead of re-building?
  # - Verify-prep already built and tested signed desktop+Android binaries
  #   for the same commit (prep branch HEAD == tag commit post-merge-prep).
  # - The inject-dev-version.js script self-skips when the base-version tag
  #   doesn't exist yet (the case on release-prep/vX.Y.Z), so verify-prep
  #   binaries carry the clean release version.
  # - Re-building would cost ~60-75min of redundant compute for
  #   byte-identical outputs.
  # ─────────────────────────────────────────────────────────────────────────
  publish-artifacts:
    needs: [prepare-release, verify-prep, create-draft-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Download verify-prep artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Artifact tree ==="
          find ./artifacts -maxdepth 4 -type f | sort

      - name: Stage release assets
        env:
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        run: |
          mkdir -p release-assets

          # macOS DMGs (skip raw .app bundles — those are folders, not user downloads)
          find ./artifacts/macos-aarch64 -name "*.dmg" -exec cp {} release-assets/ \; 2>/dev/null || true
          find ./artifacts/macos-x86_64 -name "*.dmg" -exec cp {} release-assets/ \; 2>/dev/null || true

          # Linux
          find ./artifacts/linux -name "*.deb" -exec cp {} release-assets/ \; 2>/dev/null || true
          find ./artifacts/linux -name "*.AppImage" -exec cp {} release-assets/ \; 2>/dev/null || true
          find ./artifacts/linux -name "*.rpm" -exec cp {} release-assets/ \; 2>/dev/null || true

          # Windows
          find ./artifacts/windows -name "*.msi" -exec cp {} release-assets/ \; 2>/dev/null || true
          find ./artifacts/windows -name "*.exe" -exec cp {} release-assets/ \; 2>/dev/null || true

          # Android: rename universal APK/AAB with versioned filename
          UNIVERSAL_APK=$(find ./artifacts/android -path "*universal/release/*.apk" -type f 2>/dev/null | head -1)
          UNIVERSAL_AAB=$(find ./artifacts/android -path "*universalRelease/*.aab" -type f 2>/dev/null | head -1)
          if [ -n "$UNIVERSAL_APK" ]; then
            cp "$UNIVERSAL_APK" "release-assets/haex-vault_${PACKAGE_VERSION}_universal.apk"
          else
            echo "::error::No universal Android APK found in android artifact"
            exit 1
          fi
          if [ -n "$UNIVERSAL_AAB" ]; then
            cp "$UNIVERSAL_AAB" "release-assets/haex-vault_${PACKAGE_VERSION}_universal.aab"
          else
            echo "::error::No universal Android AAB found in android artifact"
            exit 1
          fi

          echo "=== Staged assets ==="
          ls -la release-assets/

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" release-assets/* --clobber

  # ─────────────────────────────────────────────────────────────────────────
  # Flip the release from draft → published
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [create-draft-release, publish-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create-draft-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.RELEASE_ID),
              draft: false,
              prerelease: false
            });

  # ─────────────────────────────────────────────────────────────────────────
  # Sync release branch back to main via PR (so main's version files catch up).
  # Uses --auto: if there's no conflict the PR auto-merges after CI Success;
  # if there is a conflict, the PR remains open for manual handling (release
  # itself is already published, so this step is best-effort cosmetic).
  # ─────────────────────────────────────────────────────────────────────────
  sync-to-main:
    needs: [prepare-release, publish-release]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release
        uses: actions/checkout@v6
        with:
          ref: release
          fetch-depth: 0

      - name: Open sync PR to main
        env:
          NEW_VERSION: ${{ needs.prepare-release.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="sync-main/v${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$SYNC_BRANCH"
          git push origin "$SYNC_BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$SYNC_BRANCH" \
            --title "chore(release): sync main to v$NEW_VERSION" \
            --body "Post-release sync: brings v$NEW_VERSION version-bump commit into main so dev builds report the correct base version.")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          # Best-effort auto-merge — if there's a conflict the PR stays open.
          gh pr merge "$PR_NUMBER" --squash --auto || \
            echo "::warning::Auto-merge enable failed for sync PR #$PR_NUMBER (likely conflict). PR remains open for manual review."
