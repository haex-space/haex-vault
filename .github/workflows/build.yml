name: Build

on:
  # Build runs on direct pushes to long-lived branches (main, release) and
  # on every pull_request event. Feature/PR branches are NOT in the push
  # filter on purpose: when a developer pushes to a PR branch, only the
  # pull_request event runs CI. The earlier "push: ['**']" trigger fired
  # both push and pull_request for the same SHA, so concurrency had to
  # cancel one — and the cancelled run left a "CI Success" required-check
  # entry behind that branch protection counted as a failure even after
  # the surviving run succeeded. Dropping the push-on-feature-branches
  # trigger eliminates the duplicate at the source.
  push:
    branches:
      - main
      - release
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:
  # Expose as reusable workflow so release.yml can verify a prep branch
  # directly, sidestepping the anti-recursion rule that blocks build.yml
  # from triggering via bot-created PR events.
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out and verify (e.g. release-prep/vX.Y.Z)'
        required: false
        type: string
        default: ''

concurrency:
  # One run per logical work unit. Three cases:
  #   - workflow_call (from release.yml): unique per run_id so a release
  #     verify never queues behind a push-Build for the same commit. Keeps
  #     the original escape that an earlier SHA-based key broke.
  #   - release branch: shared 'build-release' so a new push cancels the
  #     previous release build (serial).
  #   - everywhere else: keyed by commit SHA. Now that push and
  #     pull_request can no longer both fire for the same SHA (push only
  #     runs on main/release), this grouping mostly matters for force-push
  #     to a PR branch — the new pull_request run cancels the previous
  #     one cleanly without leaving stale required-check entries.
  group: ${{ github.event_name == 'workflow_call' && format('build-call-{0}', github.run_id) || (github.ref == 'refs/heads/release' && 'build-release') || format('build-{0}', github.event.pull_request.head.sha || github.sha) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  # Skip build only for version bump commits (they trigger the Release workflow via tag).
  # Dependabot PRs always run full CI now — branch protection requires CI Success before
  # merge, so skipping CI would silently pass the required check. Fail-secure > save-cpu.
  check-skip:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
      is_dependabot: ${{ steps.dep-context.outputs.is_dependabot }}
      dep_update_type: ${{ steps.dep-meta.outputs.update-type }}
      skip_e2e: ${{ steps.dep-context.outputs.skip_e2e }}
    steps:
      - name: Check if version bump commit
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
          if [[ "$FIRST_LINE" == "Bump version to"* ]]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping build for version bump commit"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Detect Dependabot semver level so we can gate E2E tests:
      # patch/minor → skip E2E (pragmatic), major → run E2E (strict).
      - name: Fetch Dependabot metadata
        if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
        id: dep-meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute dependency context
        id: dep-context
        env:
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          UPDATE_TYPE: ${{ steps.dep-meta.outputs.update-type }}
        run: |
          if [ "$ACTOR" = "dependabot[bot]" ] && [ "$EVENT" = "pull_request" ]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
            # Skip E2E only when we have positive confirmation of patch/minor.
            # Empty/unknown update-type → default to running E2E (strict).
            case "$UPDATE_TYPE" in
              version-update:semver-patch|version-update:semver-minor)
                echo "skip_e2e=true" >> "$GITHUB_OUTPUT"
                echo "Dependabot $UPDATE_TYPE — pragmatic gate (E2E skipped)"
                ;;
              *)
                echo "skip_e2e=false" >> "$GITHUB_OUTPUT"
                echo "Dependabot update-type='$UPDATE_TYPE' — strict gate (E2E required)"
                ;;
            esac
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
            echo "skip_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  # Run tests first before building
  test:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # When invoked as a reusable workflow from release.yml, inputs.ref
          # points at the prep branch we want to verify. For push/PR runs
          # inputs.ref is empty and checkout falls back to the event's sha.
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run TypeScript tests
        run: pnpm test

  # Desktop E2E tests (run after desktop build, independent of Android)
  e2e-tests:
    needs: [test, check-skip, build-desktop]
    if: needs.check-skip.outputs.should_skip != 'true' && needs.check-skip.outputs.skip_e2e != 'true'
    uses: haex-space/haex-e2e-tests/.github/workflows/e2e-tests.yml@main
    with:
      build_type: build
      # Clone the same ref we just built from so the Nuxt/TS bundle matches
      # the Rust binary. Without this the frontend falls back to 'main' and
      # ships a different contract than the backend, e.g. missing fields
      # that the Rust command layer now requires.
      haex_vault_version: ${{ github.head_ref || github.ref_name }}
      haex_vault_artifact: haex-vault-linux-e2e
      haex_vault_artifact_run_id: ${{ github.run_id }}
      haextension_version: main
      vault_sdk_version: main
      sync_server_version: main

  # Android E2E tests (run after Android build, independent of desktop E2E)
  e2e-tests-android:
    name: Android E2E Tests
    needs: [check-skip, build-android]
    if: needs.check-skip.outputs.should_skip != 'true' && needs.check-skip.outputs.skip_e2e != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout E2E tests
        uses: actions/checkout@v6
        with:
          repository: haex-space/haex-e2e-tests
          ref: main

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Android APK artifact
        uses: actions/download-artifact@v8
        with:
          name: haex-vault-android-e2e
          path: ./apk

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android/sdk/ndk

      - name: Clone sync-server for docker-compose config
        run: |
          mkdir -p repos
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/haex-space/haex-sync-server.git repos/haex-sync-server

      - name: Start backend services
        run: |
          docker compose -f docker/docker-compose.yml up -d sync-db sync-gotrue sync-kong sync-server
          echo "Waiting for backend services..."
          for i in {1..60}; do
            if curl -s http://localhost:3002/ > /dev/null 2>&1; then
              echo "Sync server ready after ~$((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Create test script
        run: |
          cat > /tmp/run-android-e2e.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          WS="$GITHUB_WORKSPACE"
          APK_FILE=$(find "$WS/apk" -name "*.apk" -type f | head -1)
          echo "Installing APK: $APK_FILE"
          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK file found!"
            exit 1
          fi
          adb install "$APK_FILE"
          adb reverse tcp:3002 tcp:3002
          adb reverse tcp:8000 tcp:8000
          cd "$WS"
          ~/.maestro/bin/maestro test .maestro/android-smoke-test.yaml --format junit --output maestro-results.xml || true
          if [ -f .maestro/android-sync-test.yaml ]; then
            ~/.maestro/bin/maestro test .maestro/android-sync-test.yaml --format junit --output maestro-sync-results.xml || true
          fi
          SCRIPT
          chmod +x /tmp/run-android-e2e.sh

      - name: Run Android E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: /tmp/run-android-e2e.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-results-${{ github.run_id }}
          path: |
            maestro-results.xml
            maestro-sync-results.xml
          retention-days: 30

  build-desktop:
    needs: [test, check-skip]
    if: needs.check-skip.outputs.should_skip != 'true'
    # Cap build time so a hung apt-get or CDN 504 doesn't silently burn
    # 6 hours of runner time (GitHub's default) and block the release
    # pipeline indefinitely. Observed normal runtime is ~12-15 min.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clean stale migration caches
        shell: bash
        run: find src-tauri/target -path "*/database/migrations" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Inject -dev.<sha> suffix for non-release builds. The release branch
      # carries the canonical version and tags get built from release.yml,
      # so we skip injection for those flows.
      - name: Inject dev version suffix
        if: github.ref != 'refs/heads/release' && !startsWith(github.ref, 'refs/tags/')
        run: node scripts/inject-dev-version.js

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ contains(matrix.args, 'aarch64') && 'aarch64' || 'x86_64' }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app

      - name: Upload artifacts (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm

      # Build E2E binary with relaxed CSP for Docker internal hostnames
      - name: Build E2E binary with Docker CSP
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          jq '.app.security.csp["connect-src"] += ["http://sync-kong:8000", "http://sync-server:3002", "http://marketplace:3001", "http://marketplace-kong:8000", "ws://sync-kong:8000", "ws://sync-server:3002", "wss://sync-kong:8000", "wss://sync-server:3002"]' \
            src-tauri/tauri.conf.json > /tmp/tauri-e2e.conf.json && \
            mv /tmp/tauri-e2e.conf.json src-tauri/tauri.conf.json
          cd src-tauri && cargo build --release

      - name: Upload Linux binary for E2E tests
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: haex-vault-linux-e2e
          path: src-tauri/target/release/haex-vault
          retention-days: 1

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    needs: [test, check-skip]
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
        id: setup-ndk

      - name: Setup Android NDK environment for OpenSSL
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

          # Add all Android toolchains to PATH for OpenSSL cross-compilation
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

          # Set CC, AR, RANLIB for each target
          echo "CC_aarch64_linux_android=aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=llvm-ranlib" >> $GITHUB_ENV

          echo "CC_armv7_linux_androideabi=armv7a-linux-androideabi24-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_armv7_linux_androideabi=llvm-ranlib" >> $GITHUB_ENV

          echo "CC_i686_linux_android=i686-linux-android24-clang" >> $GITHUB_ENV
          echo "AR_i686_linux_android=llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_i686_linux_android=llvm-ranlib" >> $GITHUB_ENV

          echo "CC_x86_64_linux_android=x86_64-linux-android24-clang" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_x86_64_linux_android=llvm-ranlib" >> $GITHUB_ENV

          # 16KB page alignment for native libraries (required by API 30+ emulators and Android 15+ devices)
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_RUSTFLAGS=-C link-arg=-z -C link-arg=max-page-size=16384" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_RUSTFLAGS=-C link-arg=-z -C link-arg=max-page-size=16384" >> $GITHUB_ENV
          echo "CARGO_TARGET_I686_LINUX_ANDROID_RUSTFLAGS=-C link-arg=-z -C link-arg=max-page-size=16384" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_LINUX_ANDROID_RUSTFLAGS=-C link-arg=-z -C link-arg=max-page-size=16384" >> $GITHUB_ENV

      - name: Install build dependencies for OpenSSL
        run: |
          sudo apt-get update
          sudo apt-get install -y perl make

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean stale migration caches
        run: |
          # Remove cached migration files from target/ to prevent stale schemas
          # after migration squash/regeneration. The Rust build will re-copy from
          # src-tauri/database/migrations/ (the source of truth).
          find src-tauri/target -path "*/database/migrations" -type d -exec rm -rf {} + 2>/dev/null || true

      # Inject -dev.<sha> suffix for non-release builds (release.yml builds
      # from tags and skips this step entirely).
      - name: Inject dev version suffix
        if: github.ref != 'refs/heads/release' && !startsWith(github.ref, 'refs/tags/')
        run: node scripts/inject-dev-version.js

      - name: Initialize Android project
        run: |
          rm -rf src-tauri/gen/android
          pnpm tauri android init

      - name: Update Kotlin version for biometry plugin
        run: |
          sed -i 's/kotlin-gradle-plugin:1.9.25/kotlin-gradle-plugin:2.1.0/' src-tauri/gen/android/build.gradle.kts

      - name: Add camera permission to Android manifest
        run: |
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.CAMERA" \/>\n    <uses-feature android:name="android.hardware.camera" android:required="false" \/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" \/>' src-tauri/gen/android/app/src/main/AndroidManifest.xml

      - name: Copy custom MainActivity
        run: |
          cp .github/android-MainActivity.kt src-tauri/gen/android/app/src/main/java/space/haex/vault/MainActivity.kt

      - name: Generate app icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Setup Keystore and Signing Config
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            # Decode keystore from base64 secret
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/keystore.jks
            ls -la /tmp/keystore.jks

            # Create keystore.properties for Gradle signing config
            echo "storeFile=/tmp/keystore.jks" > src-tauri/gen/android/keystore.properties
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> src-tauri/gen/android/keystore.properties
            echo "keyAlias=$ANDROID_KEY_ALIAS" >> src-tauri/gen/android/keystore.properties
            echo "keyPassword=$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/keystore.properties

            # Copy pre-configured build.gradle.kts with signing config
            cp .github/android-signing-build.gradle.kts src-tauri/gen/android/app/build.gradle.kts

            echo "KEYSTORE_CONFIGURED=true" >> $GITHUB_ENV
            echo "Keystore configured for signing"
          else
            echo "KEYSTORE_CONFIGURED=false" >> $GITHUB_ENV
            echo "No keystore configured, building unsigned APK"
          fi

      - name: Build Android APK and AAB
        run: |
          # Build universal APK (all architectures in one APK) - required for Play Store
          pnpm tauri android build --apk --aab

      - name: List generated APK files
        run: |
          echo "=== Generated APK files ==="
          find src-tauri/gen/android/app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Generated AAB files ==="
          find src-tauri/gen/android/app/build/outputs -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

      # Upload signed release APK for E2E tests
      - name: Find and upload Android APK for E2E tests
        run: |
          echo "Looking for release APK files for E2E tests..."

          # Find signed release APK (universal preferred)
          APK_PATH=""
          if [ -f "src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk" ]; then
            APK_PATH="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          else
            # Find any release APK as fallback (prefer signed over unsigned)
            APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*release*.apk" -not -name "*unsigned*" -type f 2>/dev/null | head -1)
            if [ -z "$APK_PATH" ]; then
              APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -name "*release*.apk" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            # Check if APK is unsigned (no keystore was configured)
            if [[ "$APK_PATH" == *"unsigned"* ]]; then
              echo "APK is unsigned, signing with debug key for E2E tests..."
              # Generate a temporary debug keystore
              keytool -genkey -v \
                -keystore /tmp/debug.keystore \
                -storepass android \
                -alias androiddebugkey \
                -keypass android \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US" \
                -noprompt

              SIGNED_APK="${APK_PATH/unsigned/debug-signed}"
              cp "$APK_PATH" "$SIGNED_APK"

              # Sign with debug key
              jarsigner -verbose \
                -sigalg SHA256withRSA -digestalg SHA-256 \
                -keystore /tmp/debug.keystore \
                -storepass android -keypass android \
                "$SIGNED_APK" androiddebugkey

              # Zipalign (find build-tools path dynamically)
              ALIGNED_APK="/tmp/app-e2e.apk"
              ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name zipalign | head -1)
              "$ZIPALIGN" -v 4 "$SIGNED_APK" "$ALIGNED_APK"
              APK_PATH="$ALIGNED_APK"
              echo "Debug-signed APK ready: $APK_PATH"
            fi

            echo "Using APK for E2E: $APK_PATH"
            mkdir -p e2e-apk
            cp "$APK_PATH" e2e-apk/
            echo "APK_FOUND=true" >> $GITHUB_ENV
          else
            echo "WARNING: No release APK found for E2E tests"
            echo "APK_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Upload Android APK for E2E tests
        if: env.APK_FOUND == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: haex-vault-android-e2e
          path: e2e-apk/*.apk
          retention-days: 1

  # Single aggregate gate used as the required check in branch protection.
  # Pragmatic gate (always required): test, build-desktop, build-android.
  # Strict gate (additionally required): e2e-tests, e2e-tests-android.
  # E2E is skipped only for confirmed patch/minor Dependabot updates.
  ci-success:
    name: CI Success
    needs: [check-skip, test, build-desktop, build-android, e2e-tests, e2e-tests-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI gate
        env:
          SHOULD_SKIP: ${{ needs.check-skip.outputs.should_skip }}
          SKIP_E2E: ${{ needs.check-skip.outputs.skip_e2e }}
          IS_DEPENDABOT: ${{ needs.check-skip.outputs.is_dependabot }}
          DEP_TYPE: ${{ needs.check-skip.outputs.dep_update_type }}
          TEST: ${{ needs.test.result }}
          BUILD_DESKTOP: ${{ needs.build-desktop.result }}
          BUILD_ANDROID: ${{ needs.build-android.result }}
          E2E_DESKTOP: ${{ needs.e2e-tests.result }}
          E2E_ANDROID: ${{ needs.e2e-tests-android.result }}
        run: |
          if [ "$SHOULD_SKIP" = "true" ]; then
            echo "Build intentionally skipped (version bump or broken main) — gate passes"
            exit 0
          fi

          echo "Context: is_dependabot=$IS_DEPENDABOT dep_type='$DEP_TYPE' skip_e2e=$SKIP_E2E"
          echo "Results: test=$TEST build-desktop=$BUILD_DESKTOP build-android=$BUILD_ANDROID e2e=$E2E_DESKTOP e2e-android=$E2E_ANDROID"

          fail=0
          require() {
            local name="$1" result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name did not succeed (result=$result)"
              fail=1
            fi
          }

          # Pragmatic gate: always required
          require "test" "$TEST"
          require "build-desktop" "$BUILD_DESKTOP"
          require "build-android" "$BUILD_ANDROID"

          # Strict gate: E2E required unless this is a patch/minor Dependabot update
          if [ "$SKIP_E2E" = "true" ]; then
            echo "E2E gate relaxed: pragmatic mode for Dependabot $DEP_TYPE"
          else
            require "e2e-tests" "$E2E_DESKTOP"
            require "e2e-tests-android" "$E2E_ANDROID"
          fi

          if [ "$fail" = "1" ]; then
            echo "::error::CI gate failed — see results above"
            exit 1
          fi

          echo "All required jobs passed"
