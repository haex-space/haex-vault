name: Dependabot Auto-Merge

# Enables GitHub's auto-merge for Dependabot PRs. The actual merge gate is
# enforced by branch protection on main (required check: "CI Success"), so
# this workflow just flips the auto-merge flag — GitHub waits for CI itself.

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$PR_NUMBER" --squash --auto --repo "$REPO"
